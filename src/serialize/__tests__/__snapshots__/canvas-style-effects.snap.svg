<svg xmlns="http://www.w3.org/2000/svg" width="340" height="220" viewBox="0 0 340 220" role="img">
	<title>Golden style/effects</title>
	<defs><style>@font-face{font-family:"Inter";src:https://example.com/inter.woff2;}</style></defs>
	<rect x="0" y="0" width="340" height="220" fill="#ffffff" />
	<path transform="translate(10 10)" d="M 12 0 H 90 V 40 A 20 20 0 0 1 70 60 H 4 A 4 4 0 0 1 0 56 V 12 A 12 12 0 0 1 12 0 Z" fill="#e2e8f0" stroke="#0f172a" stroke-width="3" stroke-opacity="0.6" stroke-dasharray="6 3" stroke-linecap="round" stroke-linejoin="bevel" />
	<defs><marker id="arrow-end-arrow-line" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" /></marker></defs><line transform="translate(120 20)" x1="0" y1="0" x2="80" y2="40" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-end-arrow-line)" />
	<defs><filter id="effects-spread-shadow"><feMorphology in="SourceAlpha" operator="dilate" radius="4" result="sp0" /><feGaussianBlur in="sp0" stdDeviation="3" result="bl0" /><feOffset in="bl0" dx="2" dy="3" result="of0" /><feFlood flood-color="#0f172a" flood-opacity="0.5" result="fl0" /><feComposite in="fl0" in2="of0" operator="in" result="sh0" /><feMerge><feMergeNode in="sh0" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs><rect transform="translate(220 10)" width="80" height="40" fill="#ffffff" filter="url(#effects-spread-shadow)" />
	<defs><filter id="effects-soft-blur"><feGaussianBlur stdDeviation="3" /></filter></defs><ellipse transform="translate(120 100)" cx="30" cy="20" rx="30" ry="20" fill="#22c55e" filter="url(#effects-soft-blur)" />
	<defs><filter id="effects-stacked"><feGaussianBlur in="SourceAlpha" stdDeviation="2" result="bl0" /><feOffset in="bl0" dx="1" dy="2" result="of0" /><feFlood flood-color="#000000" flood-opacity="1" result="fl0" /><feComposite in="fl0" in2="of0" operator="in" result="sh0" /><feMerge><feMergeNode in="sh0" /><feMergeNode in="SourceGraphic" /></feMerge><feGaussianBlur stdDeviation="1.5" /></filter></defs><polygon transform="translate(220 100)" points="30,0 38.8168,17.8647 58.5317,20.7295 44.2658,34.6353 47.6336,54.2705 30,45 12.3664,54.2705 15.7342,34.6353 1.4683,20.7295 21.1832,17.8647" fill="#8b5cf6" filter="url(#effects-stacked)" />
	<defs><filter id="adjust-fitted-image"><feColorMatrix type="matrix" values="0.4884 0.4648 0.0468 0 0.2 0.1385 0.8148 0.0468 0 0.2 0.1385 0.4648 0.3968 0 0.2 0 0 0 1 0" /></filter></defs><image transform="translate(10 100)" width="60" height="40" preserveAspectRatio="xMidYMid meet" filter="url(#adjust-fitted-image)" href="https://cdn.example.com/photo-fit.png" />
	<text transform="translate(10 170)" font-family="Inter" font-size="16" font-weight="400" fill="#000000"><tspan x="0" y="16" text-decoration="line-through">Struck </tspan><tspan x="56" y="16">and plain</tspan></text>
</svg>